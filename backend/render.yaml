services:
  - type: web
    name: akwa-palace-backend
    runtime: python
    repo: https://github.com/yourusername/akwa-palace-backend  # Replace with your repo
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: false
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app